<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zyhawk ERP</title>
    <style>
      #app-loader {
        position: fixed; inset: 0;
        background: #f8fafc;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      #app-loader-spinner {
        width: 36px; height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #0f172a;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      #app-loader-text {
        margin-top: 14px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #94a3b8;
        letter-spacing: 0.05em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div id="app-loader-spinner"></div>
      <div id="app-loader-text">Loading Zyhawk ERP…</div>
    </div>
    <div id="root"></div>
    <script>
      // Hide loader once React has mounted
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var loader = document.getElementById('app-loader');
            if (loader) {
              loader.classList.add('hidden');
              setTimeout(function() { loader.remove(); }, 350);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
